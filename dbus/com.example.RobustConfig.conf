<!-- dbus/com.example.RobustConfig.conf
     D-Bus system bus security policy for the robust-config daemon.

     Install to: /etc/dbus-1/system.d/com.example.RobustConfig.conf
     (done automatically by 'make install')

     Permissions granted:
       - The 'robust_config' process (root or a dedicated service account)
         may own the bus name and send/receive ConfigChanged signals.
       - Any local user may receive (subscribe to) the ConfigChanged signal,
         but may not send signals or own the name.

     Adjust <allow user="..."> or add a dedicated system user for tighter
     production ACLs.
-->
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Service identity -->
  <policy user="root">
    <allow own="com.example.RobustConfig"/>
    <allow send_destination="com.example.RobustConfig"/>
    <allow send_interface="com.example.RobustConfig"/>
    <allow receive_sender="com.example.RobustConfig"/>
  </policy>

  <!-- Allow any local user to subscribe to ConfigChanged signals -->
  <policy context="default">
    <allow receive_sender="com.example.RobustConfig"/>
    <allow send_destination="com.example.RobustConfig"
           send_interface="com.example.RobustConfig"
           send_member="ConfigChanged"
           send_type="signal"/>
  </policy>

</busconfig>
